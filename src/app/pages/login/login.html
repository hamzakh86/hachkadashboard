<div class="login-page">
  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Login card -->
  <div class="login-card animate-fade-in">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-logo">
        <span class="icon" style="font-size:26px;color:#fff;">diamond</span>
      </div>
      <div>
        <h1 class="brand-name">HACHKA</h1>
        <p class="brand-tagline">Panneau d'administration</p>
      </div>
    </div>

    <!-- Title -->
    <div class="login-heading">
      <h2>Bienvenue</h2>
      <p>Connectez-vous pour gérer votre boutique</p>
    </div>

    <!-- Error alert -->
    <div *ngIf="erreur" class="alert-error animate-fade-in">
      <span class="icon" style="font-size:18px;">error</span>
      <span>{{ erreur }}</span>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <div class="input-wrap">
          <span class="input-icon icon">email</span>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="admin@hachka.tn"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon icon">lock</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="motDePasse"
            name="motDePasse"
            placeholder="••••••••"
            class="form-control"
            required
          />
          <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
            <span class="icon" style="font-size:18px;">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading" class="icon">login</span>
        <span *ngIf="loading" class="icon spin">sync</span>
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <!-- Hint -->
    <div class="login-hint">
      <span class="icon" style="font-size:14px;color:#334155;">info</span>
      <span>Compte test : <strong>khaled&#64;test.com</strong> / <strong>123456</strong></span>
    </div>
  </div>
</div>
