<div class="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">
        HACHKA
      </h1>
      <p class="text-gray-400 mt-2">Dashboard Admin</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
      <h2 class="text-2xl font-bold text-white mb-6">Connexion</h2>

      <!-- Erreur -->
      <div *ngIf="erreur" class="bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded-lg mb-4">
        {{ erreur }}
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="mb-4">
          <label class="block text-gray-300 text-sm font-medium mb-2">Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="admin@hachka.tn"
            class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition"
            required
          />
        </div>

        <!-- Mot de passe -->
        <div class="mb-6">
          <label class="block text-gray-300 text-sm font-medium mb-2">Mot de passe</label>
          <input
            type="password"
            [(ngModel)]="motDePasse"
            name="motDePasse"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition"
            required
          />
        </div>

        <!-- Bouton -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold py-3 px-4 rounded-lg hover:from-yellow-600 hover:to-yellow-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading">Connexion...</span>
        </button>
      </form>

      <!-- Infos test -->
      <div class="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700">
        <p class="text-xs text-gray-400 mb-2">Compte test :</p>
        <p class="text-xs text-gray-300">Email: khaled@test.com</p>
        <p class="text-xs text-gray-300">Mot de passe: 123456</p>
      </div>
    </div>
  </div>
</div>
