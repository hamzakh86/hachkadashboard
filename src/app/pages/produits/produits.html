<div class="min-h-screen bg-black">
  <app-sidebar></app-sidebar>
  <app-navbar></app-navbar>

  <div class="ml-64 pt-16 p-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-white">Produits</h1>
        <p class="text-gray-400 mt-1">Gérez votre catalogue produits</p>
      </div>
      <button
        (click)="openCreateModal()"
        class="px-6 py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold rounded-lg hover:from-yellow-600 hover:to-yellow-700 transition"
      >
        ➕ Nouveau Produit
      </button>
    </div>

    <!-- Table -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-800">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Image</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Nom</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Catégorie</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Prix</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Stock</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
          <tr *ngFor="let produit of produits" class="hover:bg-gray-800/50 transition">
            <td class="px-6 py-4">
              <img [src]="produit.image" class="w-12 h-12 rounded-lg object-cover" />
            </td>
            <td class="px-6 py-4 text-sm font-medium text-white">{{ produit.nom }}</td>
            <td class="px-6 py-4 text-sm text-gray-400">{{ produit.categorie }}</td>
            <td class="px-6 py-4 text-sm font-semibold text-yellow-500">{{ produit.prix }} TND</td>
            <td class="px-6 py-4 text-sm text-gray-300">{{ produit.stock }}</td>
            <td class="px-6 py-4">
              <button
                (click)="openEditModal(produit)"
                class="px-3 py-1 bg-blue-500/10 text-blue-500 rounded-lg hover:bg-blue-500/20 transition mr-2"
              >
                ✏️ Modifier
              </button>
              <button
                (click)="deleteProduit(produit._id)"
                class="px-3 py-1 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500/20 transition"
              >
                🗑️ Supprimer
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="produits.length === 0" class="p-12 text-center">
        <p class="text-gray-400">Aucun produit pour le moment</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-900 rounded-xl border border-gray-800 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-800">
        <h2 class="text-2xl font-bold text-white">{{ isEdit ? 'Modifier' : 'Nouveau' }} Produit</h2>
      </div>

      <div class="p-6 space-y-4">
        <!-- Nom -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Nom du produit</label>
          <input
            type="text"
            [(ngModel)]="formData.nom"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
          />
        </div>

        <!-- Prix -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">Prix (TND)</label>
            <input
              type="number"
              [(ngModel)]="formData.prix"
              class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">Ancien Prix (TND)</label>
            <input
              type="number"
              [(ngModel)]="formData.ancienPrix"
              class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
            />
          </div>
        </div>

        <!-- Catégorie -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Catégorie</label>
          <select
            [(ngModel)]="formData.categorie"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
          >
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <!-- Tailles -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Tailles disponibles</label>
          <div class="flex flex-wrap gap-2">
            <button
              *ngFor="let taille of taillesToutes"
              (click)="toggleTaille(taille)"
              [class]="isTailleSelected(taille) ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-400'"
              class="px-4 py-2 rounded-lg font-medium transition"
            >
              {{ taille }}
            </button>
          </div>
        </div>

        <!-- Image URL -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">URL de l'image</label>
          <input
            type="text"
            [(ngModel)]="formData.image"
            placeholder="https://images.unsplash.com/..."
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
          />
        </div>

        <!-- Badge -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Badge (optionnel)</label>
          <input
            type="text"
            [(ngModel)]="formData.badge"
            placeholder="Nouveau, Promo..."
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
          />
        </div>

        <!-- Stock -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Stock</label>
          <input
            type="number"
            [(ngModel)]="formData.stock"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-yellow-500"
          />
        </div>
      </div>

      <div class="p-6 border-t border-gray-800 flex gap-4">
        <button
          (click)="closeModal()"
          class="flex-1 px-6 py-3 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition"
        >
          Annuler
        </button>
        <button
          (click)="saveProduit()"
          class="flex-1 px-6 py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold rounded-lg hover:from-yellow-600 hover:to-yellow-700 transition"
        >
          {{ isEdit ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>
    </div>
  </div>
</div>
