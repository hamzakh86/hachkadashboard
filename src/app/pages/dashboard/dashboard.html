<div class="min-h-screen bg-black">
  <app-sidebar></app-sidebar>
  <app-navbar></app-navbar>

  <div class="ml-64 pt-16 p-8">
    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div *ngFor="let stat of stats" class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <div class="flex items-center justify-between mb-4">
          <div class="w-12 h-12 rounded-lg bg-gradient-to-r {{ stat.bg }} flex items-center justify-center text-2xl">
            {{ stat.icon }}
          </div>
        </div>
        <h3 class="text-3xl font-bold text-white mb-1">{{ stat.value }}</h3>
        <p class="text-gray-400 text-sm">{{ stat.label }}</p>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
      <div class="p-6 border-b border-gray-800">
        <h2 class="text-xl font-bold text-white">Commandes Récentes</h2>
        <p class="text-sm text-gray-400 mt-1">Les 5 dernières commandes</p>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">ID</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Client</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Produit</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Prix</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase">Statut</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-800">
            <tr *ngFor="let order of recentOrders" class="hover:bg-gray-800/50 transition">
              <td class="px-6 py-4 text-sm font-medium text-gray-300">{{ order.id }}</td>
              <td class="px-6 py-4 text-sm text-gray-300">{{ order.client }}</td>
              <td class="px-6 py-4 text-sm text-gray-400">{{ order.produit }}</td>
              <td class="px-6 py-4 text-sm font-semibold text-yellow-500">{{ order.prix }} TND</td>
              <td class="px-6 py-4">
                <span class="px-3 py-1 rounded-full text-xs font-medium {{ getStatutClass(order.statut) }}">
                  {{ getStatutLabel(order.statut) }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
