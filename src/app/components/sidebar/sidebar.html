<aside class="sidebar" [class.collapsed]="collapsed">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <span class="icon" style="font-size:22px;color:#fff;">diamond</span>
    </div>
    <div class="logo-text" *ngIf="!collapsed">
      <span class="logo-brand">HACHKA</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <button class="collapse-btn" (click)="toggleCollapse()" [title]="collapsed ? 'Expand' : 'Collapse'">
      <span class="icon">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</span>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <div class="nav-section-label" *ngIf="!collapsed">NAVIGATION</div>

    <a *ngFor="let item of menuItems; let i = index"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item"
       [title]="collapsed ? item.label : ''"
       [style.animation-delay]="(i * 0.05) + 's'">
      <div class="nav-icon-wrap">
        <span class="icon">{{ item.icon }}</span>
      </div>
      <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
      <div class="nav-badge" *ngIf="item.badge && !collapsed">{{ item.badge }}</div>
    </a>
  </nav>

  <!-- Spacer -->
  <div class="sidebar-spacer"></div>

  <!-- Déconnexion -->
  <div class="sidebar-footer">
    <button class="nav-item logout-btn" (click)="deconnecter()" title="Déconnexion">
      <div class="nav-icon-wrap danger">
        <span class="icon">logout</span>
      </div>
      <span class="nav-label" *ngIf="!collapsed">Déconnexion</span>
    </button>
  </div>
</aside>
