<div class="w-64 bg-gray-900 h-screen fixed left-0 top-0 border-r border-gray-800">
  <!-- Logo -->
  <div class="p-6 border-b border-gray-800">
    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">
      HACHKA
    </h1>
    <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
  </div>

  <!-- Menu -->
  <nav class="p-4">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="bg-yellow-500/10 border-yellow-500 text-yellow-500"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-gray-800 transition mb-2 border border-transparent"
    >
      <span class="text-2xl">{{ item.icon }}</span>
      <span class="font-medium">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Déconnexion -->
  <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-800">
    <button
      (click)="deconnecter()"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-400 hover:bg-red-500/10 transition"
    >
      <span class="text-2xl">🚪</span>
      <span class="font-medium">Déconnexion</span>
    </button>
  </div>
</div>
