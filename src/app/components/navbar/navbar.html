<header class="navbar" [style.left]="sidebarWidth">
  <div class="navbar-inner">
    <!-- Page title area (left) -->
    <div class="navbar-left">
      <div class="breadcrumb">
        <span class="icon" style="font-size:18px;color:#6366f1;">home</span>
        <span class="bc-sep">›</span>
        <span class="bc-current">{{ currentPage }}</span>
      </div>
    </div>

    <!-- Right controls -->
    <div class="navbar-right">
      <!-- Search -->
      <div class="search-box">
        <span class="icon search-icon">search</span>
        <input type="text" placeholder="Rechercher..." class="search-input" />
      </div>

      <!-- Notifications -->
      <button class="icon-btn" title="Notifications">
        <span class="icon">notifications</span>
        <span class="notif-dot"></span>
      </button>

      <!-- Divider -->
      <div class="nav-divider"></div>

      <!-- User avatar -->
      <div class="user-chip">
        <div class="user-avatar">
          {{ user?.nom?.charAt(0)?.toUpperCase() || 'A' }}
        </div>
        <div class="user-info">
          <span class="user-name">{{ user?.nom || 'Admin' }}</span>
          <span class="user-role">Administrateur</span>
        </div>
        <span class="icon" style="font-size:18px;color:#475569;">expand_more</span>
      </div>
    </div>
  </div>
</header>
